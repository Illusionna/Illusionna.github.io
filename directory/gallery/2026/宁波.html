    <script>
        let imagesToLoad = [
            { id: '宁波', src: './imgs/宁波.png' },
            { id: '宁波东钱湖', src: './imgs/宁波东钱湖.png' },

            { id: '宁波东钱湖小瑞士红房子', src: './imgs/宁波东钱湖小瑞士红房子.png' },
            { id: '宁波鼓楼', src: './imgs/宁波鼓楼.png' },
            { id: '宁波陶然村', src: './imgs/宁波陶然村.png' },
            { id: '天一阁', src: './imgs/天一阁.png' },
            { id: '天一阁麒麟', src: './imgs/天一阁麒麟.png' },
            { id: '天一阁石狮', src: './imgs/天一阁石狮.png' },
            { id: '天一阁石狮像', src: './imgs/天一阁石狮像.png' },
            { id: '天一阁一隅', src: './imgs/天一阁一隅.png' },
            { id: '天一阁园林', src: './imgs/天一阁园林.png' },
            { id: '文脉归流', src: './imgs/文脉归流.png' },
        ];

        function loadImage(imgId, src, callback) {
            let img = new Image();
            img.src = src;
            img.onload = function() {
                document.getElementById(imgId).src = src;
                callback();
            };
        }

        function loadImages(imgIdsAndSrcs, callback) {
            let loadedCount = 0;
            let totalCount = imgIdsAndSrcs.length;
            imgIdsAndSrcs.forEach(function(imgInfo) {
                loadImage(imgInfo.id, imgInfo.src, function() {
                    loadedCount++;
                    if (loadedCount === totalCount) {
                        callback();
                    }
                });
            });
        }

        let loader = document.getElementById('loader');
        let normalPage = document.getElementById('normal-page');

        loadImages(imagesToLoad, function() {
            loader.style.display = 'none';
            normalPage.style.display = 'block';
        });
    </script>
